<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="Arial, Helvetica, sans-serif">
  <rect x="0" y="0" width="1400" height="900" fill="#ffffff"/>

  <text x="700" y="55" text-anchor="middle" font-size="30" font-weight="700" fill="#1a1a1a">MDN Hyperparameter Search Space</text>
  <text x="700" y="90" text-anchor="middle" font-size="16" fill="#555555">5 hyperparameters | 48 possible combinations | 10 randomly sampled | Best highlighted in green</text>

  <g transform="translate(80,140)">
    <rect x="0" y="0" width="1240" height="100" fill="#fafafa" stroke="#999" stroke-width="1.5" rx="6"/>
    <text x="30" y="38" font-size="20" font-weight="700" fill="#333">K — num_gaussians</text>
    <text x="30" y="68" font-size="14" fill="#666">Number of Gaussian components in the MDN output mixture.</text>
    <text x="30" y="88" font-size="14" fill="#666">More components → more expressive distribution, but harder to train with few data.</text>

    <g transform="translate(720,30)">
      <rect x="0" y="0" width="80" height="50" fill="#fff" stroke="#888" stroke-width="1.5" rx="4"/>
      <text x="40" y="33" font-size="22" font-weight="700" text-anchor="middle" fill="#333">2</text>
    </g>
    <g transform="translate(820,30)">
      <rect x="0" y="0" width="80" height="50" fill="#1D9E75" stroke="#0F6E56" stroke-width="2.5" rx="4"/>
      <text x="40" y="33" font-size="22" font-weight="700" text-anchor="middle" fill="#fff">3</text>
      <text x="40" y="-6" font-size="13" font-weight="700" text-anchor="middle" fill="#0F6E56">★ BEST</text>
    </g>
    <g transform="translate(920,30)">
      <rect x="0" y="0" width="80" height="50" fill="#fff" stroke="#888" stroke-width="1.5" rx="4"/>
      <text x="40" y="33" font-size="22" font-weight="700" text-anchor="middle" fill="#333">5</text>
    </g>
  </g>

  <g transform="translate(80,260)">
    <rect x="0" y="0" width="1240" height="100" fill="#fafafa" stroke="#999" stroke-width="1.5" rx="6"/>
    <text x="30" y="38" font-size="20" font-weight="700" fill="#333">hidden_dim</text>
    <text x="30" y="68" font-size="14" fill="#666">Number of neurons per hidden layer (3 hidden layers total).</text>
    <text x="30" y="88" font-size="14" fill="#666">Larger → more capacity, slower training, higher overfitting risk on small datasets.</text>

    <g transform="translate(770,30)">
      <rect x="0" y="0" width="80" height="50" fill="#1D9E75" stroke="#0F6E56" stroke-width="2.5" rx="4"/>
      <text x="40" y="33" font-size="22" font-weight="700" text-anchor="middle" fill="#fff">64</text>
      <text x="40" y="-6" font-size="13" font-weight="700" text-anchor="middle" fill="#0F6E56">★ BEST</text>
    </g>
    <g transform="translate(870,30)">
      <rect x="0" y="0" width="80" height="50" fill="#fff" stroke="#888" stroke-width="1.5" rx="4"/>
      <text x="40" y="33" font-size="22" font-weight="700" text-anchor="middle" fill="#333">128</text>
    </g>
  </g>

  <g transform="translate(80,380)">
    <rect x="0" y="0" width="1240" height="100" fill="#fafafa" stroke="#999" stroke-width="1.5" rx="6"/>
    <text x="30" y="38" font-size="20" font-weight="700" fill="#333">dropout</text>
    <text x="30" y="68" font-size="14" fill="#666">Fraction of neurons randomly disabled during training (regularization).</text>
    <text x="30" y="88" font-size="14" fill="#666">Higher → stronger regularization, but may underfit. 0.2 = 20%, 0.3 = 30%.</text>

    <g transform="translate(770,30)">
      <rect x="0" y="0" width="80" height="50" fill="#1D9E75" stroke="#0F6E56" stroke-width="2.5" rx="4"/>
      <text x="40" y="33" font-size="22" font-weight="700" text-anchor="middle" fill="#fff">0.2</text>
      <text x="40" y="-6" font-size="13" font-weight="700" text-anchor="middle" fill="#0F6E56">★ BEST</text>
    </g>
    <g transform="translate(870,30)">
      <rect x="0" y="0" width="80" height="50" fill="#fff" stroke="#888" stroke-width="1.5" rx="4"/>
      <text x="40" y="33" font-size="22" font-weight="700" text-anchor="middle" fill="#333">0.3</text>
    </g>
  </g>

  <g transform="translate(80,500)">
    <rect x="0" y="0" width="1240" height="100" fill="#fafafa" stroke="#999" stroke-width="1.5" rx="6"/>
    <text x="30" y="38" font-size="20" font-weight="700" fill="#333">lr — learning rate</text>
    <text x="30" y="68" font-size="14" fill="#666">Step size for AdamW gradient updates.</text>
    <text x="30" y="88" font-size="14" fill="#666">Larger → faster but may diverge. Smaller → safer but slower convergence.</text>

    <g transform="translate(770,30)">
      <rect x="0" y="0" width="80" height="50" fill="#1D9E75" stroke="#0F6E56" stroke-width="2.5" rx="4"/>
      <text x="40" y="33" font-size="20" font-weight="700" text-anchor="middle" fill="#fff">1e-3</text>
      <text x="40" y="-6" font-size="13" font-weight="700" text-anchor="middle" fill="#0F6E56">★ BEST</text>
    </g>
    <g transform="translate(870,30)">
      <rect x="0" y="0" width="80" height="50" fill="#fff" stroke="#888" stroke-width="1.5" rx="4"/>
      <text x="40" y="33" font-size="20" font-weight="700" text-anchor="middle" fill="#333">5e-4</text>
    </g>
  </g>

  <g transform="translate(80,620)">
    <rect x="0" y="0" width="1240" height="100" fill="#fafafa" stroke="#999" stroke-width="1.5" rx="6"/>
    <text x="30" y="38" font-size="20" font-weight="700" fill="#333">batch — batch size</text>
    <text x="30" y="68" font-size="14" fill="#666">Number of training samples per gradient update.</text>
    <text x="30" y="88" font-size="14" fill="#666">Smaller → noisier gradients but better generalization. Larger → smoother but more memory.</text>

    <g transform="translate(770,30)">
      <rect x="0" y="0" width="80" height="50" fill="#1D9E75" stroke="#0F6E56" stroke-width="2.5" rx="4"/>
      <text x="40" y="33" font-size="22" font-weight="700" text-anchor="middle" fill="#fff">256</text>
      <text x="40" y="-6" font-size="13" font-weight="700" text-anchor="middle" fill="#0F6E56">★ BEST</text>
    </g>
    <g transform="translate(870,30)">
      <rect x="0" y="0" width="80" height="50" fill="#fff" stroke="#888" stroke-width="1.5" rx="4"/>
      <text x="40" y="33" font-size="22" font-weight="700" text-anchor="middle" fill="#333">512</text>
    </g>
  </g>

  <g transform="translate(80,750)">
    <rect x="0" y="0" width="1240" height="120" fill="#E1F5EE" stroke="#0F6E56" stroke-width="2.5" rx="6"/>
    <text x="30" y="35" font-size="18" font-weight="700" fill="#0F6E56">Best Configuration (Trial 2 / 10)</text>
    <text x="30" y="62" font-size="15" fill="#0F6E56">K = 3   |   hidden_dim = 64   |   dropout = 0.2   |   lr = 1e-3   |   batch = 256</text>
    <text x="30" y="88" font-size="15" fill="#0F6E56">Validation NLL = 0.909   |   Test NLL = 2.04   |   Test MSE (mixture mean) = 1.25</text>
    <text x="30" y="110" font-size="14" fill="#0F6E56">Dataset: 754 ion-collision events (602 train / 76 val / 76 test) | Optimizer: AdamW | Early stopping: patience = 25</text>
  </g>
</svg>
